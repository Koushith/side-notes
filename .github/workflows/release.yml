name: Release

# Tag a release: `git tag v0.1.0 && git push --tags`
# This workflow then builds installers on macOS, Windows, and Linux runners
# and uploads them to a draft GitHub Release. Edit the release notes in the
# Releases tab and click Publish when you're happy with the binaries.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & package (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run package:mac -- --publish never
        env:
          # Skip Apple notarisation for unsigned builds — the artifacts will work
          # but macOS users will need to right-click → Open the first time.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & package (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run package:win -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run package:linux -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: side-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.appx
            release/*.msix
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
