<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Side app icon. Dark paper-tone square with a serif italic S in the cream paper colour.
       Uses a path (not a text node) so the icon renders identically without Source Serif loaded. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2622" />
      <stop offset="100%" stop-color="#1a1715" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)" />
  <!-- Subtle highlight stroke at the top edge -->
  <rect x="6" y="6" width="1012" height="1012" rx="220" fill="none" stroke="rgba(247,243,236,0.06)" stroke-width="2" />

  <!-- Italic serif S, drawn as a path so font availability doesn't matter.
       Designed at 1024×1024, optical centre roughly at (512, 530). -->
